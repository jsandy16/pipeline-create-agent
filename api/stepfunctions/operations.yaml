service: stepfunctions
boto3_client: stepfunctions
description: "AWS Step Functions — state machine orchestration"

operations:
  update_state_machine:
    description: "Update the definition or settings of a state machine"
    parameters:
      stateMachineArn: {type: string, required: true}
      definition: {type: string, description: "ASL JSON definition"}
      roleArn: {type: string}

  start_execution:
    description: "Start a new execution of a state machine"
    parameters:
      stateMachineArn: {type: string, required: true}
      name: {type: string}
      input: {type: string, description: "JSON input"}

  describe_execution:
    description: "Get the status of a state machine execution"
    parameters:
      executionArn: {type: string, required: true}

  list_executions:
    description: "List executions of a state machine"
    parameters:
      stateMachineArn: {type: string, required: true}
      statusFilter: {type: string, description: "RUNNING, SUCCEEDED, FAILED, etc."}
      maxResults: {type: integer}

  stop_execution:
    description: "Stop a running execution"
    parameters:
      executionArn: {type: string, required: true}
      cause: {type: string}

  get_execution_history:
    description: "Get the event history of an execution"
    parameters:
      executionArn: {type: string, required: true}
      maxResults: {type: integer}

  create_state_machine:
    description: "Create a new state machine"
    parameters:
      name: {type: string, required: true}
      definition: {type: string, required: true}
      roleArn: {type: string, required: true}
      type: {type: string, description: "STANDARD or EXPRESS"}
      tags: {type: list}

  tag_resource:
    description: "Add tags to a Step Functions resource"
    parameters:
      resourceArn: {type: string, required: true}
      tags: {type: list, required: true}
