  # Integration graph IAM rules (used by spec_builder)
  as_target_of: {}   # IAM is passive
  as_source_to: {}   # IAM is passive

  # iam:PassRole -- critical action in pipeline context
  pass_role:
    description: >
      iam:PassRole allows a principal to pass an IAM role to an AWS service.
      This is required when creating resources that use execution roles
      (Lambda functions, EC2 instances, ECS tasks, etc.). Without PassRole
      permission, the service cannot be configured with the role.
    common_usage:
      - "Creating Lambda function with execution role"
      - "Launching EC2 instance with instance profile"
      - "Creating Glue job with service role"
      - "Starting SageMaker training job"
    condition: >
      Best practice: use iam:PassedToService condition to restrict which
      services the role can be passed to.
    example_condition:
      StringEquals:
        iam:PassedToService: "lambda.amazonaws.com"

# -- 18. Environment Variables ------------------------------------------------
env_vars:
  as_target_of: {}  # IAM is passive
  as_source_to: {}  # IAM is passive

# -- 19. VPC Triggers --------------------------------------------------------
vpc_triggers: []     # IAM does not need VPC placement (global service)

# -- 20. Integration Wiring Ownership ----------------------------------------
integrations:
  iam_as_infrastructure:
    description: >
      IAM roles and policies are created by every principal service renderer.
      The _iam_role(bp, principal) and _iam_policy(bp) helpers in
      hcl_renderer.py generate the role + inline policy based on the
      integration graph.
    services_that_create_roles:
      - service: "lambda"
        principal: "lambda.amazonaws.com"
        additional: "AWSLambdaBasicExecutionRole managed policy often attached"
      - service: "glue"
        principal: "glue.amazonaws.com"
        additional: "AWSGlueServiceRole managed policy attached"
      - service: "emr"
        principal: "elasticmapreduce.amazonaws.com"
      - service: "emr_serverless"
        principal: "emr-serverless.amazonaws.com"
      - service: "sagemaker"
        principal: "sagemaker.amazonaws.com"
        additional: "AmazonSageMakerFullAccess managed policy attached"
      - service: "step_functions"
        principal: "states.amazonaws.com"
      - service: "kinesis_firehose"
        principal: "firehose.amazonaws.com"
      - service: "kinesis_analytics"
        principal: "kinesisanalytics.amazonaws.com"
      - service: "dms"
        principal: "dms.amazonaws.com"
      - service: "redshift"
        principal: "redshift.amazonaws.com"
      - service: "msk"
        principal: "kafka.amazonaws.com"
      - service: "lake_formation"
        principal: "lakeformation.amazonaws.com"
      - service: "glue_databrew"
        principal: "databrew.amazonaws.com"
      - service: "ec2"
        principal: "ec2.amazonaws.com"
        additional: "aws_iam_instance_profile wrapper required"
      - service: "sagemaker_notebook"
        principal: "sagemaker.amazonaws.com"

  standalone_iam_role:
    description: >
      The 'iam' service type creates a standalone role via _render_iam().
      By default it uses lambda.amazonaws.com as the trust principal.
      Used for cross-service permissions or custom trust relationships.
    owned_by: "iam"
    terraform_resources:
      - "aws_iam_role (with assume_role_policy)"

  iam_for_eventbridge_targets:
    description: >
      Some EventBridge targets require an IAM role that EventBridge assumes.
      The EventBridge or CloudWatch renderer may need to create an execution
      role for targets like Step Functions, Kinesis, ECS, etc.
    targets_needing_role:
      - "step_functions"
      - "kinesis_streams"
      - "kinesis_firehose"
      - "ecs_task"
      - "codebuild"
      - "batch"

# -- 21. Terraform Resources --------------------------------------------------
terraform_resources:
  # Resources created by _render_iam() (standalone IAM service type)
  primary:
    - resource: "aws_iam_role"
      description: "IAM role with trust policy"
      always_created: true

  # Resources created by _iam_role() and _iam_policy() helpers
  helper_created:
    - resource: "aws_iam_role"
      description: "Execution role for principal services"
      label_pattern: "{resource_label}_role"
      created_by: "_iam_role(bp, principal)"
    - resource: "aws_iam_role_policy"
      description: "Inline policy computed from integration graph"
      label_pattern: "{resource_label}_policy"
      created_by: "_iam_policy(bp)"

  # Additional IAM resources used in the pipeline
  conditional:
    - resource: "aws_iam_role_policy_attachment"
      condition: "When AWS-managed policies need to be attached (e.g., AmazonSageMakerFullAccess)"
    - resource: "aws_iam_instance_profile"
      condition: "When IAM role is used with EC2"
    - resource: "aws_iam_policy"
      condition: "When a customer-managed policy is needed"
    - resource: "aws_iam_user"
      condition: "When standalone IAM users are created"
    - resource: "aws_iam_group"
      condition: "When IAM groups are created"
    - resource: "aws_iam_group_membership"
      condition: "When users are added to groups"
    - resource: "aws_iam_openid_connect_provider"
      condition: "When OIDC federation is configured"
    - resource: "aws_iam_saml_provider"
      condition: "When SAML federation is configured"
    - resource: "aws_iam_service_linked_role"
      condition: "When service-linked roles need explicit creation"
    - resource: "aws_iam_access_key"
      condition: "When programmatic access is needed for a user"

  # Resource-based policies (created by other renderers for IAM integration)
  resource_policies:
    - resource: "aws_lambda_permission"
      description: "Allows a service principal to invoke Lambda"
      common_principals:
        - "s3.amazonaws.com"
        - "events.amazonaws.com"
        - "sns.amazonaws.com"
    - resource: "aws_sqs_queue_policy"
      description: "Allows a service principal to send to SQS"
      common_principals:
        - "s3.amazonaws.com"
        - "events.amazonaws.com"
        - "sns.amazonaws.com"

# -- 22. Boto3 Operations -----------------------------------------------------
boto3_operations:
  client: "iam"
  sts_client: "sts"

  role_operations:
    create_role:
      description: "Create a new IAM role"
      parameters:
        RoleName: {type: string, required: true}
        AssumeRolePolicyDocument: {type: string, required: true, description: "JSON trust policy"}
        Description: {type: string}
        Path: {type: string, description: "Default: /"}
        MaxSessionDuration: {type: integer, description: "3600-43200 seconds"}
        PermissionsBoundary: {type: string, description: "ARN of permission boundary policy"}
        Tags: {type: list}
      returns: ["Role.RoleName", "Role.Arn", "Role.CreateDate"]
    get_role:
      description: "Get role details"
      parameters:
        RoleName: {type: string, required: true}
      returns: ["Role.Arn", "Role.AssumeRolePolicyDocument", "Role.RoleName", "Role.Description", "Role.MaxSessionDuration"]
    list_roles:
      description: "List IAM roles"
      parameters:
        PathPrefix: {type: string}
        MaxItems: {type: integer}
      returns: ["Roles[].RoleName", "Roles[].Arn", "Roles[].CreateDate"]
    delete_role:
      description: "Delete an IAM role (must detach all policies first)"
      parameters:
        RoleName: {type: string, required: true}
    update_assume_role_policy:
      description: "Update role trust policy"
      parameters:
        RoleName: {type: string, required: true}
        PolicyDocument: {type: string, required: true}
    tag_role:
      description: "Add tags to a role"
      parameters:
        RoleName: {type: string, required: true}
        Tags: {type: list, required: true}

  policy_operations:
    create_policy:
      description: "Create a customer-managed policy"
      parameters:
        PolicyName: {type: string, required: true}
        PolicyDocument: {type: string, required: true}
        Description: {type: string}
        Path: {type: string}
        Tags: {type: list}
      returns: ["Policy.Arn", "Policy.PolicyName"]
    get_policy:
      description: "Get policy metadata"
      parameters:
        PolicyArn: {type: string, required: true}
      returns: ["Policy.PolicyName", "Policy.Arn", "Policy.AttachmentCount", "Policy.DefaultVersionId"]
    get_policy_version:
      description: "Get policy document for a specific version"
      parameters:
        PolicyArn: {type: string, required: true}
        VersionId: {type: string, required: true}
      returns: ["PolicyVersion.Document"]
    attach_role_policy:
      description: "Attach a managed policy to a role"
      parameters:
        RoleName: {type: string, required: true}
        PolicyArn: {type: string, required: true}
    detach_role_policy:
      description: "Detach a managed policy from a role"
      parameters:
        RoleName: {type: string, required: true}
        PolicyArn: {type: string, required: true}
    put_role_policy:
      description: "Create or update an inline policy on a role (upsert)"
      parameters:
        RoleName: {type: string, required: true}
        PolicyName: {type: string, required: true}
        PolicyDocument: {type: string, required: true}
    get_role_policy:
      description: "Get an inline policy document"
      parameters:
        RoleName: {type: string, required: true}
        PolicyName: {type: string, required: true}
      returns: ["PolicyDocument"]
    list_role_policies:
      description: "List inline policy names on a role"
      parameters:
        RoleName: {type: string, required: true}
      returns: ["PolicyNames"]
    list_attached_role_policies:
      description: "List managed policies attached to a role"
      parameters:
        RoleName: {type: string, required: true}
      returns: ["AttachedPolicies[].PolicyName", "AttachedPolicies[].PolicyArn"]

  user_operations:
    create_user:
      description: "Create a new IAM user"
      parameters:
        UserName: {type: string, required: true}
        Path: {type: string}
        Tags: {type: list}
      returns: ["User.UserName", "User.Arn"]
    get_user:
      description: "Get user details"
      parameters:
        UserName: {type: string}  # omit for current user
      returns: ["User.UserName", "User.Arn", "User.CreateDate"]
    list_users:
      description: "List IAM users"
      parameters:
        PathPrefix: {type: string}
      returns: ["Users[].UserName", "Users[].Arn"]
    create_access_key:
      description: "Create access key for a user"
      parameters:
        UserName: {type: string, required: true}
      returns: ["AccessKey.AccessKeyId", "AccessKey.SecretAccessKey"]
      note: "SecretAccessKey only returned on creation; cannot be retrieved later"

  group_operations:
    create_group:
      description: "Create an IAM group"
      parameters:
        GroupName: {type: string, required: true}
        Path: {type: string}
      returns: ["Group.GroupName", "Group.Arn"]
    add_user_to_group:
      description: "Add a user to a group"
      parameters:
        GroupName: {type: string, required: true}
        UserName: {type: string, required: true}
    list_groups:
      description: "List IAM groups"
      parameters:
        PathPrefix: {type: string}
      returns: ["Groups[].GroupName", "Groups[].Arn"]

  sts_operations:
    assume_role:
      description: "Assume an IAM role and get temporary credentials"
      client: sts
      parameters:
        RoleArn: {type: string, required: true}
        RoleSessionName: {type: string, required: true}
        DurationSeconds: {type: integer, description: "900-43200 seconds"}
        ExternalId: {type: string, description: "For cross-account; prevents confused deputy"}
        Policy: {type: string, description: "Session policy to further restrict permissions"}
        Tags: {type: list, description: "Session tags for ABAC"}
      returns: ["Credentials.AccessKeyId", "Credentials.SecretAccessKey", "Credentials.SessionToken", "Credentials.Expiration"]
    get_caller_identity:
      description: "Get the identity of the caller (useful for debugging)"
      client: sts
      parameters: {}
      returns: ["Account", "Arn", "UserId"]

  reporting_operations:
    generate_credential_report:
      description: "Generate IAM credential report"
      parameters: {}
    get_credential_report:
      description: "Download credential report (CSV)"
      parameters: {}
      returns: ["Content (base64)", "GeneratedTime", "ReportFormat"]
    get_account_summary:
      description: "Get account-level IAM quota usage"
      parameters: {}
      returns: ["SummaryMap (dict of quota name -> count)"]

# -- 23. Runtime Diagnostics --------------------------------------------------
runtime_diagnostics:
  - pattern: "NoSuchEntityException.*role|role.*does not exist"
    category: RESOURCE_NOT_FOUND
    cause: "IAM role not found -- terraform apply may not have completed"
    fix_type: manual
    resolution: "Verify role name (should be resource_name + '-role'). Re-run terraform apply if missing."

  - pattern: "AccessDenied|not authorized|UnauthorizedAccess"
    category: PERMISSION
    cause: "Caller lacks required IAM permissions"
    fix_type: update_iam
    resolution: >
      Check which action was denied (look for 'performing ACTION on resource ARN').
      Add the missing action to the role's inline policy or attach a managed policy.

  - pattern: "MalformedPolicyDocument|invalid.*policy"
    category: VALIDATION
    cause: "Policy JSON is malformed or uses invalid syntax"
    fix_type: update_config
    resolution: >
      Fix policy JSON. Common issues: missing Version field, invalid Action format,
      invalid Resource ARN, missing Effect, bad condition operator.

  - pattern: "EntityAlreadyExists"
    category: ALREADY_EXISTS
    cause: "IAM entity (role, user, policy) already exists"
    fix_type: none
    resolution: "Entity already created. Use update operations to modify."

  - pattern: "DeleteConflict|cannot be deleted"
    category: PRECONDITION
    cause: "IAM entity has dependencies that must be removed first"
    fix_type: manual
    resolution: >
      For roles: detach all managed policies, delete all inline policies,
      remove from instance profiles. For users: delete access keys, remove
      from groups, detach policies.

  - pattern: "LimitExceeded.*role|too many roles"
    category: QUOTA
    cause: "Exceeding IAM role limit (1000 per account, adjustable)"
    fix_type: manual
    resolution: "Delete unused roles or request quota increase via Service Quotas."

  - pattern: "PassRole.*not authorized"
    category: PERMISSION
    cause: "Caller lacks iam:PassRole permission"
    fix_type: update_iam
    resolution: >
      Add iam:PassRole to the caller's policy with Resource set to the role ARN.
      Use iam:PassedToService condition to scope it to the target service.

  - pattern: "InvalidInput.*trust.*policy|Invalid principal"
    category: VALIDATION
    cause: "Trust policy has invalid principal or structure"
    fix_type: update_config
    resolution: >
      Fix trust policy. Common issues: non-existent account ID, wrong service
      principal format, missing sts:AssumeRole action.

  - pattern: "PolicyLengthExceeded|policy.*too large"
    category: QUOTA
    cause: "Policy document exceeds size limit"
    fix_type: manual
    resolution: >
      For managed policies: max 6144 bytes. For inline: max 2048 bytes.
      Split into multiple policies, use wildcards, or use managed policies.

  - pattern: "CredentialReport.*not.*ready|generation.*in.*progress"
    category: TRANSIENT
    cause: "Credential report is being generated"
    fix_type: retry
    resolution: "Wait a few seconds and retry get_credential_report()."

# -- 24. Tags ----------------------------------------------------------------
tags:
  max_per_role: 50
  max_per_user: 50
  max_per_policy: 50
  key_max_length: 128
  value_max_length: 256
  supported_resources:
    - "aws_iam_role"
    - "aws_iam_user"
    - "aws_iam_policy"
    - "aws_iam_openid_connect_provider"
    - "aws_iam_saml_provider"
    - "aws_iam_instance_profile"
    - "aws_iam_server_certificate"
  terraform_block: "tags"
  note: "Tags are mandatory per engineering standards. Every taggable resource uses _tags_block(bp)."
  abac:
    description: "Attribute-Based Access Control using tags"
    mechanism: >
      Use aws:PrincipalTag and aws:ResourceTag condition keys in policies
      to grant access based on tag values rather than explicit resource ARNs.
    example: >
      A policy that allows actions only when the principal's 'project' tag
      matches the resource's 'project' tag.

# -- 25. Code Update (Developer Agent) ---------------------------------------
code_update:
  method: api_config
  boto3_client: iam
  description: >
    IAM roles/policies updated via put_role_policy() (inline policy, immediate
    effect). Managed policies via attach_role_policy(). Trust policy (who can
    assume) via update_assume_role_policy(). All changes take effect immediately.
    Use get_caller_identity() (sts client) to verify current identity.
  config_update:
    client: iam
    operation: put_role_policy
    id_param: RoleName
    note: "put_role_policy() is an upsert -- creates or replaces the named inline policy"
  discovery_ops:
    - op: get_role
      id_param: RoleName
      returns: ["Role.Arn", "Role.AssumeRolePolicyDocument", "Role.RoleName", "Role.Description"]
    - op: list_role_policies
      id_param: RoleName
      returns: ["PolicyNames"]
    - op: get_role_policy
      id_params: [RoleName, PolicyName]
      returns: ["PolicyDocument"]
    - op: list_attached_role_policies
      id_param: RoleName
      returns: ["AttachedPolicies[].PolicyName", "AttachedPolicies[].PolicyArn"]
    - op: get_caller_identity
      client: sts
      id_param: null
      returns: ["Account", "Arn", "UserId"]
    - op: list_roles
      id_param: PathPrefix
      returns: ["Roles[].RoleName", "Roles[].Arn"]
    - op: get_account_summary
      id_param: null
      returns: ["SummaryMap"]
