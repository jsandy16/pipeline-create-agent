# ============================================================================
# IAM Comprehensive Development Spec
# ============================================================================
# This spec is the single source of truth for ALL IAM knowledge needed by
# the pipeline engine, HCL renderer, spec builder, developer agent, and
# autofix agent. It extends the original specs/iam.yaml with exhaustive
# coverage of IAM capabilities, policy patterns, trust relationships,
# integration with the pipeline engine, and Terraform resource patterns.
#
# NOTE: In our pipeline engine, IAM appears in two forms:
#   1. As a service type ("iam"): Standalone IAM role rendered by _render_iam()
#   2. As infrastructure for all principal services: Every compute service
#      (Lambda, Glue, EMR, SageMaker, etc.) has an IAM execution role
#      created by _iam_role() and _iam_policy() helpers in hcl_renderer.py
#
# Structure:
#   1. identity            - service metadata & Terraform mapping
#   2. naming              - resource naming constraints
#   3. defaults            - Terraform attribute defaults
#   4. quotas              - AWS service limits
#   5. users               - IAM users
#   6. groups              - IAM groups
#   7. roles               - IAM roles (execution roles, service roles, cross-account)
#   8. policies            - managed and inline policies
#   9. trust_policies      - assume role trust relationships
#  10. permission_boundaries - limiting maximum permissions
#  11. identity_providers   - OIDC, SAML, AWS SSO
#  12. service_linked_roles - AWS-managed roles
#  13. access_analyzer      - IAM Access Analyzer
#  14. policy_language      - IAM policy JSON structure and evaluation logic
#  15. condition_keys       - global and service-specific condition keys
#  16. encryption           - N/A for IAM
#  17. iam                  - complete action catalog, ARN formats
#  18. env_vars             - auto-wired environment variables
#  19. vpc_triggers         - VPC placement rules
#  20. integrations         - wiring ownership with all connected services
#  21. terraform_resources  - all TF resource types
#  22. boto3_operations     - complete API operation reference
#  23. runtime_diagnostics  - error patterns & auto-fix rules
#  24. tags                 - tagging constraints
#  25. code_update          - developer agent instructions
# ============================================================================

# -- 1. Identity -------------------------------------------------------------
identity:
  service_type: iam
  aws_service_name: "AWS Identity and Access Management"
  is_principal: false         # IAM itself is not a compute principal
  terraform_resource: aws_iam_role
  description: >
    AWS IAM manages access to AWS services and resources securely.
    In the pipeline engine, the 'iam' service type creates a standalone
    IAM role with a trust policy. Additionally, every principal service
    (Lambda, Glue, EMR, etc.) automatically gets an IAM execution role
    and inline policy generated by the _iam_role() and _iam_policy()
    helpers based on the integration graph.
  free_tier:
    status: always_free
    details: "IAM is always free. No charges for users, roles, policies, or API calls."
  pricing_model: free         # Completely free service

# -- 2. Naming ---------------------------------------------------------------
naming:
  role_name:
    max_length: 64
    valid_characters: "a-zA-Z0-9+=,.@_-"
    rules:
      - "Must be unique within the AWS account"
      - "Case sensitive (MyRole != myrole)"
      - "Cannot begin with 'aws-' (reserved for AWS)"
  policy_name:
    max_length: 128
    valid_characters: "a-zA-Z0-9+=,.@_-"
  user_name:
    max_length: 64
    valid_characters: "a-zA-Z0-9+=,.@_-"
  group_name:
    max_length: 128
    valid_characters: "a-zA-Z0-9+=,.@_-"
  path:
    max_length: 512
    valid_characters: "a-zA-Z0-9/!@#$%^&*()_+-="
    rules:
      - "Must begin and end with /"
      - "Default path is /"
      - "Used for organizing IAM resources hierarchically"
  instance_profile_name:
    max_length: 128
    valid_characters: "a-zA-Z0-9+=,.@_-"

# -- 3. Defaults (free-tier safe) --------------------------------------------
defaults:
  path: "/"
  max_session_duration: 3600   # 1 hour (range: 3600-43200 seconds)
  # The _render_iam() function creates a role with Lambda trust policy by default
  # Other service renderers use _iam_role(bp, "SERVICE.amazonaws.com")

# -- 4. Quotas ---------------------------------------------------------------
quotas:
  # IAM entities
  roles_per_account: 1000               # adjustable to 5000
  users_per_account: 5000               # adjustable
  groups_per_account: 300               # adjustable
  instance_profiles_per_account: 1000   # adjustable
  policies_per_account: 1500            # adjustable to 5000 customer-managed

  # Per-entity limits
  managed_policies_per_role: 10         # adjustable to 20
  managed_policies_per_user: 10         # adjustable to 20
  managed_policies_per_group: 10        # adjustable to 20
  inline_policies_per_role: 250         # sum of all inline policy sizes <= 10240 bytes
  inline_policies_per_user: 250
  inline_policies_per_group: 250
  groups_per_user: 10
  access_keys_per_user: 2
  tags_per_role: 50
  tags_per_user: 50
  versions_per_policy: 5               # managed policy versions

  # Size limits
  managed_policy_size: "6144 bytes"     # 6 KB JSON
  inline_policy_size: "2048 bytes"      # per inline policy (combined: 10240 bytes per role)
  trust_policy_size: "2048 bytes"
  role_session_name_length: 64
  max_session_duration_range: "3600-43200 seconds"  # 1 hour to 12 hours

  # API limits
  assume_role_rate: 500                 # TPS per account (adjustable)
  get_session_token_rate: 500
  api_throttle_rate: "Varies by API; typically 15-100 TPS"

# -- 5. Users ----------------------------------------------------------------
users:
  description: >
    IAM users represent individual people or applications with long-term
    credentials (password and/or access keys). Best practice is to use IAM
    roles instead of users for applications.
  terraform_resource: "aws_iam_user"
  credentials:
    console_password:
      terraform_resource: "aws_iam_user_login_profile"
      note: "Requires password policy compliance"
    access_keys:
      terraform_resource: "aws_iam_access_key"
      max_per_user: 2
      best_practice: "Rotate regularly; prefer IAM roles for applications"
    mfa:
      types: ["Virtual MFA device", "Hardware TOTP", "FIDO2 security key"]
      terraform_resource: "aws_iam_virtual_mfa_device"
  best_practices:
    - "Use IAM Identity Center (SSO) instead of IAM users for human access"
    - "Use IAM roles instead of access keys for applications"
    - "Enable MFA for all user accounts"
    - "Grant least privilege permissions"
    - "Use groups to manage permissions, not per-user policies"

# -- 6. Groups ---------------------------------------------------------------
groups:
  description: >
    IAM groups are collections of users. Attach policies to groups
    instead of individual users for scalable permission management.
  terraform_resource: "aws_iam_group"
  membership:
    terraform_resource: "aws_iam_group_membership"
    max_users_per_group: 1000  # practical limit
  policy_attachment:
    terraform_resource: "aws_iam_group_policy_attachment"  # managed policy
    inline: "aws_iam_group_policy"  # inline policy
  constraints:
    - "Groups cannot be nested (no group-in-group)"
    - "A user can be in up to 10 groups"
    - "Groups cannot be referenced as principals in resource policies"

# -- 7. Roles ----------------------------------------------------------------
roles:
  description: >
    IAM roles are the primary mechanism for granting permissions to AWS services
    and cross-account access. In our pipeline engine, every principal service
    gets an execution role with an inline policy computed from the integration graph.
  terraform_resource: "aws_iam_role"

  types:
    service_role:
      description: "Role assumed by an AWS service (Lambda, EC2, Glue, etc.)"
      trust_principal: "SERVICE.amazonaws.com"
      examples:
        - "lambda.amazonaws.com"
        - "glue.amazonaws.com"
        - "ec2.amazonaws.com"
        - "sagemaker.amazonaws.com"
        - "states.amazonaws.com"
        - "events.amazonaws.com"
        - "firehose.amazonaws.com"
        - "dms.amazonaws.com"
        - "emr-serverless.amazonaws.com"
        - "redshift.amazonaws.com"
        - "lakeformation.amazonaws.com"
        - "databrew.amazonaws.com"
        - "kafka.amazonaws.com"
        - "codebuild.amazonaws.com"
    cross_account_role:
      description: "Role assumed by principals in another AWS account"
      trust_principal: "arn:aws:iam::ACCOUNT_ID:root"
      use_cases:
        - "Cross-account S3 access"
        - "Cross-account deployment"
        - "Organization-wide access patterns"
    federation_role:
      description: "Role assumed by federated identities (SAML, OIDC)"
      trust_principal: "arn:aws:iam::ACCOUNT_ID:saml-provider/PROVIDER"
      or_oidc: "OIDC_PROVIDER_URL"
    ec2_instance_role:
      description: "Role attached to EC2 via instance profile"
      trust_principal: "ec2.amazonaws.com"
      instance_profile:
        terraform_resource: "aws_iam_instance_profile"
        note: "EC2 roles require an instance profile wrapper"

  pipeline_engine_roles:
    description: >
      In the pipeline engine, IAM roles are created by two mechanisms:
      1. _iam_role(bp, principal) helper: Creates the role + trust policy
      2. _iam_policy(bp) helper: Creates an inline policy with actions
         computed from the integration graph (specs/*.yaml iam rules)
    role_naming: "{resource_name}-role"
    policy_naming: "{resource_name}-policy"
    role_terraform_label: "{resource_label}_role"
    policy_terraform_label: "{resource_label}_policy"

  session:
    max_duration: 43200        # 12 hours
    default_duration: 3600     # 1 hour
    terraform_attribute: "max_session_duration"
    session_tags:
      description: "Pass tags when assuming a role for ABAC"
      condition_key: "aws:PrincipalTag/${TagKey}"

# -- 8. Policies -------------------------------------------------------------
policies:
  types:
    managed:
      aws_managed:
        description: "Pre-built policies maintained by AWS"
        prefix: "arn:aws:iam::aws:policy/"
        common_policies:
          - name: "AmazonS3ReadOnlyAccess"
            arn: "arn:aws:iam::aws:policy/AmazonS3ReadOnlyAccess"
          - name: "AmazonS3FullAccess"
            arn: "arn:aws:iam::aws:policy/AmazonS3FullAccess"
          - name: "AWSLambdaBasicExecutionRole"
            arn: "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
          - name: "AWSGlueServiceRole"
            arn: "arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole"
          - name: "AmazonSageMakerFullAccess"
            arn: "arn:aws:iam::aws:policy/AmazonSageMakerFullAccess"
          - name: "AmazonEMRFullAccessPolicy_v2"
            arn: "arn:aws:iam::aws:policy/AmazonEMRFullAccessPolicy_v2"
          - name: "AmazonDynamoDBFullAccess"
            arn: "arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess"
          - name: "AmazonRedshiftFullAccess"
            arn: "arn:aws:iam::aws:policy/AmazonRedshiftFullAccess"
          - name: "AmazonKinesisFullAccess"
            arn: "arn:aws:iam::aws:policy/AmazonKinesisFullAccess"
          - name: "AdministratorAccess"
            arn: "arn:aws:iam::aws:policy/AdministratorAccess"
            warning: "NEVER use in production"
      customer_managed:
        description: "Policies you create and manage"
        terraform_resource: "aws_iam_policy"
        max_size: "6144 bytes"
        max_versions: 5
    inline:
      description: "Policies embedded directly in a user, group, or role"
      terraform_resources:
        user: "aws_iam_user_policy"
        group: "aws_iam_group_policy"
        role: "aws_iam_role_policy"
      max_size: "2048 bytes per inline policy"
      max_combined_size: "10240 bytes per role"
      note: >
        Our pipeline engine uses inline policies for all service roles.
        The _iam_policy(bp) helper creates one inline policy per role
        with all actions computed from the integration graph.

  attachment:
    terraform_resources:
      role: "aws_iam_role_policy_attachment"
      user: "aws_iam_user_policy_attachment"
      group: "aws_iam_group_policy_attachment"
    max_per_entity: 10         # adjustable to 20

# -- 9. Trust Policies (Assume Role) -----------------------------------------
trust_policies:
  description: >
    The trust policy (AssumeRolePolicyDocument) defines WHO can assume the role.
    It is a JSON policy document attached to the role itself.
  structure:
    Version: "2012-10-17"
    Statement:
      Effect: "Allow"
      Principal:
        description: "Who can assume: Service, AWS account, Federated identity"
      Action: "sts:AssumeRole (or sts:AssumeRoleWithSAML, sts:AssumeRoleWithWebIdentity)"
      Condition:
        description: "Optional conditions (e.g., external ID, source account)"

  principal_types:
    service:
      format: '{"Service": "SERVICE.amazonaws.com"}'
      examples:
        - '{"Service": "lambda.amazonaws.com"}'
        - '{"Service": "ec2.amazonaws.com"}'
        - '{"Service": "glue.amazonaws.com"}'
        - '{"Service": "states.amazonaws.com"}'
        - '{"Service": "events.amazonaws.com"}'
        - '{"Service": "sagemaker.amazonaws.com"}'
        - '{"Service": ["lambda.amazonaws.com", "edgelambda.amazonaws.com"]}'  # multiple
    aws_account:
      format: '{"AWS": "arn:aws:iam::ACCOUNT_ID:root"}'
      cross_account: '{"AWS": "arn:aws:iam::OTHER_ACCOUNT:role/RoleName"}'
    federated:
      saml: '{"Federated": "arn:aws:iam::ACCOUNT:saml-provider/NAME"}'
      oidc: '{"Federated": "OIDC_PROVIDER_URL"}'
      cognito: '{"Federated": "cognito-identity.amazonaws.com"}'

  common_conditions:
    external_id:
      description: "Prevents confused deputy problem in cross-account access"
      key: "sts:ExternalId"
      example: '{"StringEquals": {"sts:ExternalId": "UNIQUE_ID"}}'
    source_account:
      description: "Restrict to specific source AWS account"
      key: "aws:SourceAccount"
    source_arn:
      description: "Restrict to specific source resource ARN"
      key: "aws:SourceArn"
    mfa:
      description: "Require MFA for role assumption"
      key: "aws:MultiFactorAuthPresent"
      example: '{"Bool": {"aws:MultiFactorAuthPresent": "true"}}'

  pipeline_engine_trust_policies:
    description: >
      The _iam_role(bp, principal) helper creates trust policies for service roles.
      Common trust policy principals used in the pipeline:
    mapping:
      lambda: "lambda.amazonaws.com"
      glue: "glue.amazonaws.com"
      ec2: "ec2.amazonaws.com"
      emr: "elasticmapreduce.amazonaws.com"
      emr_serverless: "emr-serverless.amazonaws.com"
      sagemaker: "sagemaker.amazonaws.com"
      step_functions: "states.amazonaws.com"
      kinesis_firehose: "firehose.amazonaws.com"
      kinesis_analytics: "kinesisanalytics.amazonaws.com"
      dms: "dms.amazonaws.com"
      redshift: "redshift.amazonaws.com"
      msk: "kafka.amazonaws.com"
      lake_formation: "lakeformation.amazonaws.com"
      glue_databrew: "databrew.amazonaws.com"
      eventbridge: "events.amazonaws.com"
      aurora: null  # Aurora does not use an execution role in our renderer
      quicksight: null  # QuickSight uses its own service-linked role

# -- 10. Permission Boundaries -----------------------------------------------
permission_boundaries:
  description: >
    A managed policy that sets the maximum permissions a role or user CAN have.
    The effective permissions are the intersection of the identity-based policy
    and the permission boundary.
  terraform_attribute: "permissions_boundary"
  use_cases:
    - "Delegated administration: allow admins to create roles but limit what those roles can do"
    - "Guardrails for CI/CD-created roles"
    - "Compliance: ensure no role can exceed organizational limits"
  evaluation: >
    Effective permissions = (Identity-based policies) INTERSECT (Permission boundary).
    A permission must be allowed by BOTH to be effective.
  terraform_resource: "aws_iam_policy (used as boundary)"
  attachment: "permissions_boundary attribute on aws_iam_role or aws_iam_user"

# -- 11. Identity Providers --------------------------------------------------
identity_providers:
  oidc:
    description: "OpenID Connect identity providers (e.g., GitHub Actions, GitLab, Google)"
    terraform_resource: "aws_iam_openid_connect_provider"
    common_providers:
      github_actions:
        url: "https://token.actions.githubusercontent.com"
        audiences: ["sts.amazonaws.com"]
        trust_condition: '{"StringLike": {"token.actions.githubusercontent.com:sub": "repo:ORG/REPO:*"}}'
      gitlab:
        url: "https://gitlab.com"
      google:
        url: "https://accounts.google.com"
      eks:
        description: "EKS OIDC provider for IAM roles for service accounts (IRSA)"
        url: "https://oidc.eks.REGION.amazonaws.com/id/CLUSTER_ID"

  saml:
    description: "SAML 2.0 identity providers (e.g., Active Directory, Okta, OneLogin)"
    terraform_resource: "aws_iam_saml_provider"
    metadata: "XML metadata document from the identity provider"

  iam_identity_center:
    description: "AWS SSO (successor to single sign-on)"
    note: "Recommended over IAM users for human access to AWS accounts"
    terraform_resource: "aws_ssoadmin_permission_set"

# -- 12. Service-Linked Roles ------------------------------------------------
service_linked_roles:
  description: >
    Roles created and managed by AWS services. They have a fixed trust policy
    and permissions that cannot be modified. They are automatically created
    when you first use certain services.
  terraform_resource: "aws_iam_service_linked_role"
  path: "/aws-service-role/"
  common_roles:
    - service: "elasticmapreduce.amazonaws.com"
      role: "AWSServiceRoleForEMR"
    - service: "spot.amazonaws.com"
      role: "AWSServiceRoleForEC2Spot"
    - service: "autoscaling.amazonaws.com"
      role: "AWSServiceRoleForAutoScaling"
    - service: "redshift.amazonaws.com"
      role: "AWSServiceRoleForRedshift"
    - service: "lakeformation.amazonaws.com"
      role: "AWSServiceRoleForLakeFormation"
    - service: "events.amazonaws.com"
      role: "AWSServiceRoleForAmazonEventBridge"
  note: "Cannot be deleted while the service is actively using it"

# -- 13. IAM Access Analyzer -------------------------------------------------
access_analyzer:
  description: "Identifies resources shared with external entities"
  terraform_resource: "aws_accessanalyzer_analyzer"
  types:
    account: "Analyzes resources within one AWS account"
    organization: "Analyzes resources across the entire AWS Organization"
  findings:
    - "S3 buckets shared publicly or cross-account"
    - "IAM roles with overly permissive trust policies"
    - "KMS keys accessible from outside the account"
    - "Lambda layers shared externally"
    - "SQS queues with public access"
  policy_generation:
    description: "Generate least-privilege policies from CloudTrail activity"
    note: "Requires 90 days of CloudTrail data for accurate recommendations"
  policy_validation:
    description: "Validate policies against IAM best practices before deployment"
    check_types:
      - "Security warnings"
      - "Errors"
      - "Suggestions"

# -- 14. Policy Language -----------------------------------------------------
policy_language:
  version: "2012-10-17"       # Always use this version
  elements:
    Effect:
      values: ["Allow", "Deny"]
      note: "Deny always wins over Allow"
    Action:
      format: "service:ActionName"
      wildcards: "s3:Get* matches s3:GetObject, s3:GetBucketLocation, etc."
      not_action: "NotAction excludes specific actions (inverse of Action)"
    Resource:
      format: "ARN or * for all resources"
      not_resource: "NotResource excludes specific resources"
    Principal:
      note: "Only in resource-based policies (bucket policies, trust policies)"
      not_principal: "NotPrincipal excludes specific principals"
    Condition:
      description: "Optional conditions that must be true for the statement"
      operators:
        string: ["StringEquals", "StringNotEquals", "StringLike", "StringNotLike"]
        numeric: ["NumericEquals", "NumericNotEquals", "NumericLessThan", "NumericGreaterThan"]
        date: ["DateEquals", "DateLessThan", "DateGreaterThan"]
        boolean: ["Bool"]
        ip: ["IpAddress", "NotIpAddress"]
        arn: ["ArnEquals", "ArnLike"]
        null_check: ["Null"]
      if_exists_suffix: "StringEqualsIfExists -- skip if key doesn't exist"
      for_any_value: "ForAnyValue:StringLike -- any value in a multi-valued key"
      for_all_values: "ForAllValues:StringEquals -- all values must match"

  evaluation_logic:
    order:
      1: "Explicit deny in any policy -> DENY (cannot be overridden)"
      2: "Organization SCP -> if no Allow, DENY"
      3: "Resource-based policy -> if Allow AND same account, ALLOW"
      4: "Permission boundary -> if no Allow, DENY"
      5: "Session policy -> if no Allow, DENY"
      6: "Identity-based policy -> if Allow, ALLOW"
      7: "Default -> DENY (implicit deny)"
    cross_account:
      - "Cross-account access requires Allow in BOTH the identity-based policy AND the resource-based policy"
      - "Exception: S3 bucket policies and KMS key policies can grant cross-account on their own"

  best_practices:
    - "Always use 'Version: 2012-10-17' (enables policy variables)"
    - "Prefer specific actions over wildcards (s3:GetObject over s3:*)"
    - "Scope Resource to specific ARNs, not '*'"
    - "Use conditions (aws:SourceAccount, aws:SourceArn) in trust policies"
    - "Use policy variables (${aws:username}) for user-specific resources"
    - "Never use Principal: * without conditions in resource policies"

# -- 15. Condition Keys -------------------------------------------------------
condition_keys:
  global:
    - key: "aws:SourceAccount"
      description: "Account ID of the service making the request"
    - key: "aws:SourceArn"
      description: "ARN of the resource making the request"
    - key: "aws:SourceIp"
      description: "IP address of the requester"
    - key: "aws:SourceVpc"
      description: "VPC ID of the requester"
    - key: "aws:SourceVpce"
      description: "VPC endpoint ID"
    - key: "aws:PrincipalOrgID"
      description: "AWS Organization ID of the requester"
    - key: "aws:PrincipalOrgPaths"
      description: "Organization unit path of the requester"
    - key: "aws:PrincipalTag/${TagKey}"
      description: "Tag on the principal (for ABAC)"
    - key: "aws:ResourceTag/${TagKey}"
      description: "Tag on the resource being accessed"
    - key: "aws:RequestTag/${TagKey}"
      description: "Tag in the request (for tagging operations)"
    - key: "aws:TagKeys"
      description: "All tag keys in the request"
    - key: "aws:CurrentTime"
      description: "Current time for time-based conditions"
    - key: "aws:EpochTime"
      description: "Current time as epoch seconds"
    - key: "aws:SecureTransport"
      description: "Whether request was made via HTTPS"
    - key: "aws:MultiFactorAuthPresent"
      description: "Whether MFA was used"
    - key: "aws:MultiFactorAuthAge"
      description: "Seconds since MFA authentication"
    - key: "aws:RequestedRegion"
      description: "AWS region of the request"
    - key: "aws:CalledVia"
      description: "Service that made the request on behalf of the user"
    - key: "aws:CalledViaFirst"
      description: "First service in the CalledVia chain"
    - key: "aws:CalledViaLast"
      description: "Last service in the CalledVia chain"

  iam_specific:
    - key: "iam:ResourceTag/${TagKey}"
      description: "Tag on the IAM resource"
    - key: "iam:PassedToService"
      description: "Service the role is being passed to (for iam:PassRole)"
    - key: "iam:PermissionsBoundary"
      description: "ARN of the permissions boundary policy"
    - key: "iam:AWSServiceName"
      description: "AWS service for creating service-linked roles"

  sts_specific:
    - key: "sts:ExternalId"
      description: "External ID for cross-account role assumption"
    - key: "sts:RoleSessionName"
      description: "Session name when assuming role"
    - key: "sts:TransitiveTagKeys"
      description: "Session tags that persist through role chaining"

# -- 16. Encryption ----------------------------------------------------------
encryption:
  note: >
    IAM itself does not store customer data that requires encryption.
    Access keys and passwords are stored encrypted by AWS.
    IAM policies are JSON documents stored by the IAM service.

# -- 17. IAM (Action Catalog) ------------------------------------------------
iam:
  arn_formats:
    role: "arn:aws:iam::ACCOUNT:role/[PATH/]ROLE_NAME"
    user: "arn:aws:iam::ACCOUNT:user/[PATH/]USER_NAME"
    group: "arn:aws:iam::ACCOUNT:group/[PATH/]GROUP_NAME"
    policy: "arn:aws:iam::ACCOUNT:policy/[PATH/]POLICY_NAME"
    instance_profile: "arn:aws:iam::ACCOUNT:instance-profile/[PATH/]PROFILE_NAME"
    oidc_provider: "arn:aws:iam::ACCOUNT:oidc-provider/PROVIDER_URL"
    saml_provider: "arn:aws:iam::ACCOUNT:saml-provider/PROVIDER_NAME"
    mfa_device: "arn:aws:iam::ACCOUNT:mfa/DEVICE_NAME"
    server_certificate: "arn:aws:iam::ACCOUNT:server-certificate/[PATH/]CERT_NAME"
    root: "arn:aws:iam::ACCOUNT:root"

  # IAM is not a principal; always is empty
  always: []

  # Complete action catalog
  actions:
    role_management:
      - "iam:CreateRole"
      - "iam:DeleteRole"
      - "iam:GetRole"
      - "iam:ListRoles"
      - "iam:UpdateRole"
      - "iam:UpdateRoleDescription"
      - "iam:TagRole"
      - "iam:UntagRole"
      - "iam:ListRoleTags"
      - "iam:PassRole"                # Critical: allows passing role to a service
      - "iam:CreateServiceLinkedRole"
      - "iam:DeleteServiceLinkedRole"
      - "iam:GetServiceLinkedRoleDeletionStatus"

    policy_management:
      - "iam:CreatePolicy"
      - "iam:DeletePolicy"
      - "iam:GetPolicy"
      - "iam:ListPolicies"
      - "iam:CreatePolicyVersion"
      - "iam:DeletePolicyVersion"
      - "iam:GetPolicyVersion"
