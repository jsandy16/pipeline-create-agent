business_unit: engineering
cost_center: cc001
integrations:
- event: s3:ObjectCreated:*
  prefix: case/
  source: src
  suffix: null
  target: case_processor
- event: put_object
  prefix: null
  source: case_processor
  suffix: null
  target: tgt
pipeline_name: case_processing_pipeline
region: us-east-1
services:
- config:
    prefixes:
    - case/
  name: src
  type: s3
- config:
    prefixes:
    - case_stg/
  name: tgt
  type: s3
- config:
    handler: index.handler
    handler_code: "import boto3\nimport pandas as pd\nfrom io import StringIO\nfrom\
      \ datetime import datetime\n\ns3_client = boto3.client('s3')\n\ndef handler(event,\
      \ context):\n    print('Hello World')\n    \n    # Get bucket and key from event\n\
      \    bucket = event['Records'][0]['s3']['bucket']['name']\n    key = event['Records'][0]['s3']['object']['key']\n\
      \    \n    # Read CSV from S3\n    response = s3_client.get_object(Bucket=bucket,\
      \ Key=key)\n    csv_content = response['Body'].read().decode('utf-8')\n    \n\
      \    # Load into pandas dataframe\n    df = pd.read_csv(StringIO(csv_content))\n\
      \    \n    # Add createdate column with today's date\n    df['createdate'] =\
      \ datetime.now().strftime('%Y-%m-%d')\n    \n    # Write to target bucket\n\
      \    csv_buffer = StringIO()\n    df.to_csv(csv_buffer, index=False)\n    \n\
      \    target_key = key.replace('case/', 'case_stg/')\n    s3_client.put_object(\n\
      \        Bucket='tgt',\n        Key=target_key,\n        Body=csv_buffer.getvalue()\n\
      \    )\n    \n    return {'statusCode': 200, 'message': 'File processed successfully'}\n"
    memory_size: 512
    runtime: python3.12
    timeout: 300
  name: case_processor
  type: lambda
